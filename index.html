<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experimento Scroll-Snap</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #101010;
            color: white;
            margin: 0;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .snap-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            width: 80%;
            height: 200px;
            border: 1px solid white;
            gap: 10px;
        }
        .snap-item {
            flex: none;
            scroll-snap-align: center;
            width: 150px;
            height: 150px;
            background: #ffa657;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Experimento con Scroll-Snap</h1>
    <div class="snap-container">
        <div class="snap-item">1</div>
        <div class="snap-item">2</div>
        <div class="snap-item">3</div>
        <div class="snap-item">4</div>
        <div class="snap-item">5</div>
    </div>
</body>
</html>
