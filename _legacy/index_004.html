<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>ApliArte y Carrusel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            color: #ffa657;
        }
        main p {
            font-size: 1.2rem;
        }
        .carousel {
            display: flex;
            overflow-x: auto;
            padding: 10px;
            background-color: #161b22;
            width: 100%;
            position: fixed;
            bottom: 0;
            box-shadow: 0 -2px 5px #000;
        }
        .carousel a {
            text-decoration: none;
            font-size: 0.9rem;
            color: #58a6ff;
            margin: 0 5px;
            border: 1px solid #58a6ff;
            padding: 5px;
            border-radius: 5px;
            background-color: #0d1117;
        }
        .carousel a:hover {
            background-color: #58a6ff;
            color: #0d1117;
        }
        footer {
            color: #8b949e;
            font-size: 0.8rem;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>🌠 Navegando entre versiones</h1>
    </header>
    <main>
        <p>Esta página interactiva te permite moverte entre las diferentes versiones creadas, con un diseño innovador inspirado en Flutter.</p>
    </main>
    <div class="carousel">
        <a href="index_001.html">2026-03-02_01</a>
        <a href="index_002.html">2026-03-02_02</a>
        <a href="index_003.html">2026-03-02_03</a>
    </div>
    <footer>
        Diseñado con 💡 inspiración y 🌟 creatividad. ¡Sigue navegando!
    </footer>
</body>
</html>
