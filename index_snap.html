<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Snap - Mejorado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e272e, #2f3640);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 2rem;
            color: #00a8ff;
            margin-bottom: 20px;
        }
        .snap-container {
            display: flex;
            overflow-x: scroll;
            scroll-snap-type: x mandatory;
            width: 90%;
            height: 200px;
            padding: 10px;
            gap: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }
        .snap-item {
            flex: 0 0 150px;
            scroll-snap-align: center;
            background: #ff7f50;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        .snap-item:hover {
            transform: scale(1.1);
            background: #ff6f3e;
        }
    </style>
</head>
<body>
    <h1>Experimento con Scroll-Snap (Mejorado)</h1>
    <div class="snap-container">
        <div class="snap-item">1</div>
        <div class="snap-item">2</div>
        <div class="snap-item">3</div>
        <div class="snap-item">4</div>
        <div class="snap-item">5</div>
    </div>
</body>
</html>
