<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 Confirmar Asistencia - Cumple Fran</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#fff3e0,#ffe0b2);min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center;}
    .container{max-width:500px;width:100%;}
    .invite-img{width:100%;border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,0.15);display:block;margin-bottom:20px;}
    .form-card{background:white;border-radius:24px;padding:30px;box-shadow:0 8px 30px rgba(0,0,0,0.12);margin-bottom:20px;}
    .form-card h2{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#e65100;text-align:center;margin-bottom:4px;}
    .form-card .form-sub{text-align:center;color:#888;font-size:0.95rem;margin-bottom:20px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-weight:700;color:#333;font-size:0.95rem;margin-bottom:6px;}
    .form-group input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:14px;font-size:1rem;font-family:'Nunito',sans-serif;background:#fafafa;outline:none;transition:border-color 0.3s;}
    .form-group input:focus{border-color:#ff6b00;background:#fff;box-shadow:0 0 0 4px rgba(255,107,0,0.1);}
    .btn-submit{width:100%;padding:16px;background:linear-gradient(135deg,#ff6b00,#e65100);border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:1.3rem;color:white;cursor:pointer;box-shadow:0 4px 15px rgba(230,81,0,0.4);margin-top:10px;transition:0.2s;}
    .btn-submit:hover{transform:translateY(-2px);}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
    .status-msg{text-align:center;margin:15px 0;padding:12px;border-radius:12px;font-weight:600;display:none;}
    .status-msg.success{display:block;background:#e8f5e9;color:#2e7d32;}
    .status-msg.error{display:block;background:#ffebee;color:#c62828;}
    .status-msg.loading{display:block;background:#fff8e1;color:#f57f17;}
    .footer{text-align:center;color:#aaa;font-size:0.8rem;margin-top:10px;}
  </style>
</head>

    const btn = document.getElementById('submitBtn');
    const st = document.getElementById('statusMsg');
    form.addEventListener('submit', async (e) => {
