<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApliBot Web</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>
    <div id="game-container"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: "game-container",
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        function preload() {
            console.log("Preload: Aquí cargaremos los assets.");
        }

        function create() {
            this.add.text(100, 100, "Bienvenido a ApliBot Web", { font: "24px Arial", fill: "#fff" });
        }

        function update() {
            // Animaciones o lógica del juego.
        }
    </script>
</body>
</html>
